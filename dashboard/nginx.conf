server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # single self-contained page; everything is inlined, so just serve it.
    location / {
        try_files $uri /index.html;
    }

    # the page embeds confidential run data — discourage caching by shared proxies.
    add_header Cache-Control "no-store";
    gzip on;
    gzip_types text/html;
}
